# ═══════════════════════════════════════════════════════════════
#  🐍 ไฟล์นี้ทำให้เกิด "งูกิน contribution graph" ในโปรไฟล์
#
#  วิธีติดตั้ง:
#  1. ใน repo โปรไฟล์ของคุณ (repo ที่ชื่อเดียวกับ username)
#     สร้างโฟลเดอร์:  .github/workflows/
#  2. เอาไฟล์นี้ไปวางในนั้น โดยตั้งชื่อว่า  snake.yml
#  3. ไปที่แท็บ Actions ของ repo แล้วกด Enable ถ้ามันถาม
#  4. กดรัน workflow นี้ครั้งแรกด้วยตัวเอง (ปุ่ม "Run workflow")
#     หลังจากนั้นมันจะรันเองทุกวันอัตโนมัติ
#  5. รูปงูจะไปอยู่ที่ branch ชื่อ "output" — README เรียกใช้ผ่าน URL นี้แล้ว:
#     https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/output/snake.svg
#
#  หมายเหตุ: ไม่ต้องตั้งค่า token อะไรเพิ่ม ใช้ GITHUB_TOKEN ที่มีให้ในตัว
# ═══════════════════════════════════════════════════════════════

name: Generate Snake Animation

on:
  # รันอัตโนมัติทุก 24 ชั่วโมง
  schedule:
    - cron: "0 */24 * * *"
  # กดรันเองได้จากแท็บ Actions
  workflow_dispatch:
  # รันทุกครั้งที่ push ขึ้น branch main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
