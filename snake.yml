name: GitHub Snake Game

on:
  # รันอัตโนมัติทุกวันเที่ยงคืน UTC
  schedule:
    - cron: "0 0 * * *"
  # กดรันเองได้จากแท็บ Actions
  workflow_dispatch:
  # รันเมื่อ push ขึ้น main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # สร้าง GIF ชื่อ github-snake.gif (งูสีม่วง + จุดเขียวแบบ GitHub บนพื้นมืด)
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=%236c63ff&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
